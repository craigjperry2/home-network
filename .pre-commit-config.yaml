default_install_hook_types:
  - pre-commit
fail_fast: true

repos:
  - repo: local
    hooks:
      - id: nix-format
        name: Format Nix files
        language: system
        entry: bash -c 'cd nix && nix run nixpkgs#alejandra -- .'
        files: '(^|/)([^/]+\.nix|flake\.lock)$'
        pass_filenames: false

      - id: nix-flake-check
        name: Check Nix flake
        language: system
        entry: bash -c 'cd nix && nix flake check'
        files: '(^|/)([^/]+\.nix|flake\.lock)$'
        pass_filenames: false

      - id: nix-statix
        name: Lint Nix with statix
        language: system
        entry: bash -c 'cd nix && nix develop -c statix check'
        files: '(^|/)([^/]+\.nix|flake\.lock)$'
        pass_filenames: false

      - id: nix-deadnix
        name: Check unused Nix code
        language: system
        entry: bash -c 'cd nix && nix develop -c deadnix --fail'
        files: '(^|/)([^/]+\.nix|flake\.lock)$'
        pass_filenames: false

      - id: python-format
        name: Format Python scripts
        language: system
        entry: bash -c 'cd scripts && nix develop -c ruff format .'
        files: '^scripts/.*\.py$'
        pass_filenames: false

      - id: python-ruff
        name: Lint Python scripts
        language: system
        entry: bash -c 'cd scripts && nix develop -c ruff check .'
        files: '^scripts/.*\.py$'
        pass_filenames: false

      - id: python-mypy
        name: Type check Python scripts
        language: system
        entry: bash -c 'for f in "$@"; do nix develop ./scripts -c uv run --with-requirements "$f" python -m mypy "$f"; done' --
        files: '^scripts/.*\.py$'
        pass_filenames: true
